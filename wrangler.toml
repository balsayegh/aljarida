name = "aljarida-whatsapp"
main = "src/index.js"
compatibility_date = "2026-04-23"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "aljarida-db"
database_id = "58c39bb5-bc17-478d-86ba-4f2d502ff537"

[vars]
ALJARIDA_PDF_BASE_URL = "https://www.aljarida.com/uploads/pdf"
TIMEZONE = "Asia/Kuwait"

# Ottu payment gateway — production.
# OTTU_API_KEY and OTTU_WEBHOOK_SECRET are stored as wrangler secrets.
# WORKER_BASE_URL is the public URL of this Worker, used to build webhook_url
# and redirect_url passed to Ottu.
OTTU_BASE_URL = "https://pay.aljarida.com"
OTTU_PG_CODES = "credit-card,knet"
WORKER_BASE_URL = "https://aljarida-whatsapp.mnakh.workers.dev"

# WhatsApp template name for delivering Ottu checkout links. Approved by
# Meta on 2026-04-27 (UTILITY category). Works in or out of the 24h CSW
# window — primary delivery channel. If sending fails (e.g. Meta rate
# limit, transient error), the worker falls back to free-form text only
# when CSW is open.
WHATSAPP_PAYMENT_TEMPLATE_NAME = "aljarida_payment_link_ar"

# Welcome message sent when admin manually adds a "مجاني" (gift)
# subscriber. Approved by Meta on 2026-04-28 (UTILITY).
WHATSAPP_GIFT_WELCOME_TEMPLATE_NAME = "aljarida_gift_welcome_ar"

# xAI / Grok model for fact-check requests. XAI_API_KEY must be set as a
# wrangler secret (`wrangler secret put XAI_API_KEY`).
#
# Available models for our account (as of 2026-05-01) per /admin/api/grok-models:
#   grok-3, grok-3-mini
#   grok-4-0709
#   grok-4-fast-non-reasoning, grok-4-fast-reasoning   ← fast + cheap, multimodal
#   grok-4-1-fast-non-reasoning, grok-4-1-fast-reasoning
#   grok-4.20-* (newer)
#   grok-4.3                                            ← premium flagship
#
# `grok-4-fast-reasoning` is the cost/quality sweet spot for fact-checking.
# Bump to `grok-4.3` if accuracy is the bottleneck.
GROK_MODEL = "grok-4-fast-reasoning"

# Cron triggers:
#   "0 7 * * *"   — Daily at 10 AM Kuwait (7 AM UTC). Renewal reminders,
#                   auto-pause expired, phone-change timeout, stuck-broadcast
#                   watchdog, retention pruning.
#   "*/5 * * * *" — Every 5 minutes. Promotes due scheduled broadcasts
#                   (status='scheduled' AND scheduled_at <= now) to
#                   in_progress and starts the queue producer.
[triggers]
crons = ["0 7 * * *", "*/5 * * * *"]

# ----------------------------------------------------------------------------
# Broadcast queue — producer fans out daily delivery sends; consumer talks to Meta.
# Messages that fail all retries land in the DLQ for admin review.
# ----------------------------------------------------------------------------
[[queues.producers]]
binding = "BROADCAST_QUEUE"
queue = "aljarida-broadcast-sends"

[[queues.consumers]]
queue = "aljarida-broadcast-sends"
max_batch_size = 50
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "aljarida-broadcast-dlq"
max_concurrency = 10

# DLQ drain — records failed messages in broadcast_failures for admin review.
# No retries here; if this consumer fails the message just stays in the DLQ.
[[queues.consumers]]
queue = "aljarida-broadcast-dlq"
max_batch_size = 50
max_batch_timeout = 30
max_retries = 0
