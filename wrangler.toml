name = "aljarida-whatsapp"
main = "src/index.js"
compatibility_date = "2026-04-23"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "aljarida-db"
database_id = "58c39bb5-bc17-478d-86ba-4f2d502ff537"

[vars]
ALJARIDA_PDF_BASE_URL = "https://www.aljarida.com/uploads/pdf"
TIMEZONE = "Asia/Kuwait"

# Ottu payment gateway (sandbox by default — flip to prod URL when ready).
# OTTU_API_KEY and OTTU_WEBHOOK_SECRET are stored as wrangler secrets.
# WORKER_BASE_URL is the public URL of this Worker, used to build webhook_url
# and redirect_url passed to Ottu — set it after the first deploy.
OTTU_BASE_URL = "https://sandbox.ottu.net"
OTTU_PG_CODES = "knet"
WORKER_BASE_URL = "https://aljarida-whatsapp.mnakh.workers.dev"

# Daily cron — 10 AM Kuwait time (7 AM UTC)
# Runs: renewal reminders, auto-pause expired, timeout pending phone changes
[triggers]
crons = ["0 7 * * *"]

# ----------------------------------------------------------------------------
# Broadcast queue — producer fans out daily delivery sends; consumer talks to Meta.
# Messages that fail all retries land in the DLQ for admin review.
# ----------------------------------------------------------------------------
[[queues.producers]]
binding = "BROADCAST_QUEUE"
queue = "aljarida-broadcast-sends"

[[queues.consumers]]
queue = "aljarida-broadcast-sends"
max_batch_size = 50
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "aljarida-broadcast-dlq"
max_concurrency = 10

# DLQ drain — records failed messages in broadcast_failures for admin review.
# No retries here; if this consumer fails the message just stays in the DLQ.
[[queues.consumers]]
queue = "aljarida-broadcast-dlq"
max_batch_size = 50
max_batch_timeout = 30
max_retries = 0
